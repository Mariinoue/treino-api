# Configurations server
server.port=8080

# Configurations MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-RM565834}:3306/treinodb
spring.datasource.username=${DB_USER:treino_user}
spring.datasource.password=${DB_PASSWORD:treino_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurations JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true